apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: toggle-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: 121590089702.dkr.ecr.us-east-1.amazonaws.com/namespace/analytics-service:latest
        ports:
        - containerPort: 8005

        readinessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 30
          periodSeconds: 20

        env:
        - name: AWS_DYNAMODB_TABLE
          valueFrom:
            secretKeyRef:
              name: analytics-secret
              key: AWS_DYNAMODB_TABLE
        - name: AWS_SQS_URL
          valueFrom:
            secretKeyRef:
              name: analytics-secret
              key: AWS_SQS_URL
        - name: AWS_REGION
          valueFrom:
            secretKeyRef:
              name: analytics-secret
              key: AWS_REGION
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: analytics-secret
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: analytics-secret
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_SESSION_TOKEN
          valueFrom:
            secretKeyRef:
              name: analytics-secret
              key: AWS_SESSION_TOKEN

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: toggle-master
spec:
  type: ClusterIP
  ports:
  - port: 8005
    targetPort: 8005
  selector:
    app: analytics-service