apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: targeting-service
  name: targeting-service
  namespace: targeting-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
    spec:
      containers:
      - image: 628409561285.dkr.ecr.us-east-1.amazonaws.com/targeting-service:latest
        name: targeting-service
        env:
         - name: DATABASE_URL
           valueFrom:
            secretKeyRef:
              name: targeting-secrets
              key: DATABASE_URL
         - name: PORT
           valueFrom:
            configMapKeyRef:
              name: targeting-cm
              key: PORT
         - name: AUTH_SERVICE_URL
           valueFrom:
            configMapKeyRef:
              name: targeting-cm
              key: AUTH_SERVICE_URL
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
