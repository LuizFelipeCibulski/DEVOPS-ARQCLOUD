apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: auth-service
  name: auth-service
  namespace: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - image: 628409561285.dkr.ecr.us-east-1.amazonaws.com/auth-service:latest
        name: auth-service
        env:
         - name: DATABASE_URL
           valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: DATABASE_URL
         - name: MASTER_KEY
           valueFrom:
            secretKeyRef:
              name: auth-secrets
              key: MASTER_KEY
         - name: PORT
           valueFrom:
            configMapKeyRef:
              name: auth-cm
              key: PORT
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3 # 3 falhas seguidas = reinicia